services:
  backend:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    container_name: antifraude_backend
    working_dir: /src
    env_file:
      - ./Backend/.env
    volumes:
      - ./Backend:/src
      - backend_nuget:/root/.nuget/packages
    ports:
      - "5240:5240"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:5240
    command: >
      sh -c "dotnet restore Backend.csproj && dotnet run --project Backend.csproj --no-launch-profile --urls http://0.0.0.0:5240"
    restart: unless-stopped

  frontend:
    image: node:22-alpine
    container_name: antifraude_frontend
    working_dir: /app
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_ANTI_FRAUDE_API_URL: ${VITE_ANTI_FRAUDE_API_URL:-http://localhost:5240}
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_nuget:
  frontend_node_modules:
